
<div class="d-flex justify-content-center align-items-center vh-100" style="background: linear-gradient(to right, #6ec1e4, #b3e5fc);">
  <div class="card p-4 shadow rounded" style="width: 350px;">
    <h2 class="text-center text-primary mb-4">Iniciar Sesión</h2>
    <form>
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="tu@correo.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
      <p class="text-center mt-3">
        <a href="#" class="text-primary text-decoration-none">¿Olvidaste tu contraseña?</a>
      </p>
    </form>
  </div>
</div>
